<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Calculator</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
      }

      body {
        height: 100vh;
        display: flex;
        justify-content: center;

        align-items: center;
        background: #121212;
      }

      .calculator {
        background: #1e1e1e;
        padding: 20px;
        border-radius: 15px;
        width: 320px;
        box-shadow: 0 5px 20px rgba(0, 0, 0, 0.4);
      }

      #display {
        width: 100%;
        height: 60px;
        border: none;
        outline: none;
        margin-bottom: 15px;
        padding: 10px;
        font-size: 2rem;

        text-align: right;
        border-radius: 10px;
        background: #2d2d2d;
        color: white;
      }

      .buttons {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
      }

      button {
        height: 60px;
        border: none;
        border-radius: 10px;
        font-size: 1.2rem;
        cursor: pointer;
        transition: 0.2s;
      }

      button:hover {
        opacity: 0.85;
      }

      .number {
        background: #333;
        color: white;
      }

      .operator {
        background: orange;
        color: white;
      }

      .equal {
        background: #00b894;
        color: white;
      }

      .clear {
        background: #d63031;

        color: white;
      }
    </style>
  </head>
  <body>
    <div class="calculator">
      <input type="text" id="display" disabled />

      <div class="buttons">
        <button class="clear" onclick="clearDisplay()">C</button>
        <button class="operator" onclick="appendValue('/')">/</button>
        <button class="operator" onclick="appendValue('*')">*</button>
        <button class="operator" onclick="appendValue('-')">-</button>

        <button class="number" onclick="appendValue('7')">7</button>
        <button class="number" onclick="appendValue('8')">8</button>
        <button class="number" onclick="appendValue('9')">9</button>
        <button class="operator" onclick="appendValue('+')">+</button>

        <button class="number" onclick="appendValue('4')">4</button>
        <button class="number" onclick="appendValue('5')">5</button>
        <button class="number" onclick="appendValue('6')">6</button>
        <button class="equal" onclick="calculate()">=</button>

        <button class="number" onclick="appendValue('1')">1</button>
        <button class="number" onclick="appendValue('2')">2</button>

        <button class="number" onclick="appendValue('3')">3</button>
        <button class="number" onclick="appendValue('.')">.</button>

        <button
          class="number"
          style="grid-column: span 4"
          onclick="appendValue('0')"
        >
          0
        </button>
      </div>
    </div>

    <script>
      const display = document.getElementById("display");

      function appendValue(value) {
        display.value += value;
      }

      function clearDisplay() {
        display.value = "";
      }

      function calculate() {
        try {
          display.value = eval(display.value);
        } catch {
          display.value = "Error";
        }
      }
    </script>
  </body>
</html>
